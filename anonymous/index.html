<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Feedback Box</title>
  <link rel="icon" href="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/infinity.png"
    type="image/x-icon" />
  <style>
    :root {
      --primary-color: #4CAF50;
      --primary-hover: #45a049;
      --bg-color: #f2f2f2;
      --card-bg: #fff;
      --radius: 20px;
      --shadow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    section.feedback-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 95%;
      height: 90%;
      max-width: 1200px;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 20px;
    }

    .tablet,
    .feedback-card {
      flex: 1;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tablet {
      border: 6px solid #333;
      background: #000;
    }

    .tablet iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .feedback-card {
      background: var(--card-bg);
      box-shadow: 0 6px 20px var(--shadow);
      padding: 20px;
      justify-content: flex-start;
      align-items: center;
    }

    .feedback-card .logo {
      width: 140px;
      margin-bottom: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
      color: #333;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input,
    textarea,
    select {
      padding: 12px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
    }

    textarea {
      flex: 1;
      resize: none;
    }

    button {
      padding: 12px;
      border: none;
      background-color: var(--primary-color);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    .rating {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .emoji {
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .emoji:hover {
      transform: scale(1.3);
    }

    .emoji.selected {
      transform: scale(1.4);
      filter: drop-shadow(0 0 5px gold);
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--primary-color);
      color: #fff;
      padding: 25px 35px;
      border-radius: var(--radius);
      font-size: 18px;
      z-index: 1000;
      animation: fadeInOut 2s ease forwards;
    }

    @keyframes fadeInOut {
      0% {
        opacity: 0;
        transform: translate(-50%, -60%);
      }

      20% {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
    }

    /* âœ… Mobile Full-Screen View */
    @media (max-width: 900px) {

      html,
      body {
        height: 100vh;
        overflow: hidden;
      }

      .container {
        flex-direction: column;
        height: 100vh;
      }

      .tablet {
        display: none;

      }

      .feedback-card {
        flex: 1;
        height: 100vh;
        border-radius: 0;
        width: 100%;
        max-width: none;
        justify-content: flex-start;
        padding: 25px;
        overflow-y: auto;
      }

      .feedback-card::-webkit-scrollbar {
        display: none;
      }

      h2 {
        font-size: 1.4rem;
      }

      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }

      button {
        font-size: 18px;
      }
    }
  </style>
  <script src="/nav.js"></script>
</head>

<body>

  <section class="feedback-section">
    <div class="container">
      <div class="tablet">
        <iframe src="https://billiontags.com/index.html"></iframe>
      </div>

      <div class="feedback-card">
        <img src="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/BILLION%20TAGS%20PNG.png" class="logo"  alt="Logo" />
        <h2>Feel free to share your Grievances!</h2>

        <form id="feedbackForm" action="https://formspree.io/f/mzzjazpy" method="POST">
          <input type="text" name="name" placeholder="Your Name (optional)">
          <input type="text" name="tagid" placeholder="Your Tag ID (optional)">
          <input type="email" name="gmail" placeholder="Your Gmail (optional)">

          <div class="rating" id="rating">
            <span class="emoji" data-value="1" aria-label="Very Bad">ðŸ˜¡</span>
            <span class="emoji" data-value="2" aria-label="Bad">ðŸ˜ž</span>
            <span class="emoji" data-value="3" aria-label="Neutral">ðŸ˜</span>
            <span class="emoji" data-value="4" aria-label="Good">ðŸ˜Š</span>
            <span class="emoji" data-value="5" aria-label="Excellent">ðŸ˜</span>
          </div>
          <input type="hidden" name="rating" id="ratingInput">

          <textarea name="feedback" placeholder="Drop your grievances here..." required></textarea>
          <select name="category" required>
            <option value="">Select Category</option>
            <option value="work-environment">Work Environment</option>
            <option value="tools">Needs</option>
            <option value="communication">Personal</option>
            <option value="other">Other</option>
          </select>

          <button type="submit">Submit Feedback</button>
        </form>
      </div>
    </div>
  </section>

  <div class="popup" id="popup">ðŸŽ‰ Thank you for your feedback!</div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    const form = document.getElementById('feedbackForm');
    const popup = document.getElementById('popup');
    const emojis = document.querySelectorAll('.emoji');
    const ratingInput = document.getElementById('ratingInput');

    emojis.forEach(emoji => {
      emoji.addEventListener('click', () => {
        emojis.forEach(e => e.classList.remove('selected'));
        emoji.classList.add('selected');
        ratingInput.value = emoji.dataset.value;
      });
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      popup.style.display = 'block';
      confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });

      setTimeout(() => {
        form.submit();
        form.reset();
        emojis.forEach(e => e.classList.remove('selected'));
        popup.style.display = 'none';
      }, 1500);
    });
  </script>


  <!-- Floating CTA Widget -->
  <div class="orbit-widget" id="orbitWidget">

    <!-- Orbit ring -->
    <div class="orbit-ring"></div>

    <div class="expand-cta" id="expandCTA">
      Book Your Free Discovery Call
    </div>

    <!-- Center Logo -->
    <div class="center-globe">
      <img src="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/infinity.png" alt="Discovery Call">
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="ctaTooltip">Book Your Free Discovery Call</div>


  </div>

  <style>
    /* Smart CTA Expansion */
    .expand-cta {
      position: absolute;
      right: 95px;
      top: 15px;
      background: #9221e5;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(20px);
      transition: all .4s ease;
      pointer-events: none;
    }

    /* Active expansion */
    .expand-cta.show {
      opacity: 1;
      transform: translateX(0);
    }



    /* Hover effect */
    /* .orbit-widget:hover {
      transform: scale(1.08);
    } */

    /* Center globe */
    .center-globe {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      background-color: transparent;
      position: relative;
      z-index: 2;
    }

    .center-globe img {
      width: 50px;
      height: 50px;
    }

    /* Orbit ring */
    .orbit-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 2px solid #9221e5;
      border-radius: 50%;
      top: -10px;
      left: -10px;
      transform-style: preserve-3d;
      animation: orbitRotate 6s linear infinite, glow 2s ease-in-out infinite;
    }

    /* Glow animation */
    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 0 rgba(146, 33, 229, 0.4);
      }

      50% {
        box-shadow: 0 0 14px rgba(146, 33, 229, 0.7);
      }
    }

    /* Satellite */
    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #9221e5;
      border-radius: 50%;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Orbit rotation */
    @keyframes orbitRotate {
      from {
        transform: rotateX(165deg) rotateZ(0deg);
      }

      to {
        transform: rotateX(165deg) rotateZ(360deg);
      }
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      right: 95px;
      top: 15px;
      background: #9221e5;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: .3s;
    }

    .orbit-widget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 80px;
      height: 80px;
      cursor: pointer;
      z-index: 9999;

      /* smoother magnetic motion */
      transition: transform 0.25s ease-out;

      /* better animation performance */
      will-change: transform;

      /* GPU acceleration */
      transform: translate3d(0, 0, 0);
    }

    .orbit-widget:hover .tooltip { opacity: 1 !important; visibility: visible !important; }

    /* Mobile label */
    .mobile-label {
      display: none;
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: #9221e5;
      color: white;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* Bounce animation */
    @keyframes bounceAttention {

      0%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-8px)
      }

      50% {
        transform: translateY(0)
      }

      70% {
        transform: translateY(-4px)
      }
    }

    /* ================= */
    /* RESPONSIVE DESIGN */
    /* ================= */

    @media (max-width:1024px) {

      .orbit-widget {
        width: 70px;
        height: 70px;
      }

      .center-globe {
        width: 60px;
        height: 60px;
      }

      .center-globe img {
        width: 50px;
        height: 50px;
      }

      .orbit-ring {
        width: 80px;
        height: 80px;
      }

    }

    @media (max-width:768px) {

      .orbit-widget {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
      }

      .center-globe {
        width: 50px;
        height: 50px;
      }

      .center-globe img {
        width: 40px;
        height: 40px;
      }

      .orbit-ring {
        width: 70px;
        height: 70px;
      }

      .tooltip {
        display: none;
      }

      .mobile-label {
        display: block;
      }

    }

    @media (max-width:480px) {

      .orbit-widget {
        width: 55px;
        height: 55px;
      }

      .center-globe {
        width: 45px;
        height: 45px;
      }

      .center-globe img {
        width: 34px;
        height: 34px;
      }

      .orbit-ring {
        width: 65px;
        height: 65px;
      }

    }

    .bounce {
      animation: bounceAttention 0.9s ease;
    }

    /* Exit Intent Orbital Pulse */

    @keyframes exitPulse {

      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.25);
      }

      60% {
        transform: scale(1.18);
      }

      100% {
        transform: scale(1);
      }

    }

    /* Stronger glow */
    .exit-intent-active .orbit-ring {
      box-shadow: 0 0 25px rgba(146, 33, 229, 0.9);
      border-color: #b24cff;
    }

    /* Widget expansion */
    .exit-intent-active {
      animation: exitPulse 1.2s ease;
    }
  </style>

  <script>
    (function() {
      const widget = document.getElementById("orbitWidget");
      if (!widget) return;
      
      const tooltip = document.getElementById("ctaTooltip");
      const expandCTA = document.getElementById("expandCTA");
      
      widget.onclick = function () {
        window.open(
          "https://calendar.google.com/calendar/appointments/schedules/AcZssZ0QDFbA_UN8Oqs2MGQ_cpAb6FoyxDO3mACIvtvxYWjjDAhEWJmP6mvaddBsiksLe0DTDp7Fl3Tr?gv=true",
          "_blank"
        );
      };

      function triggerBounce() {
        widget.classList.add("bounce");
        setTimeout(() => {
          widget.classList.remove("bounce");
        }, 900);
      }

      setTimeout(triggerBounce, 10000);
      setInterval(triggerBounce, 20000);

      setTimeout(() => {
        if (tooltip) tooltip.style.opacity = "1";
        setTimeout(() => {
          if (tooltip) tooltip.style.opacity = "0";
        }, 4000);
      }, 6000);

      document.addEventListener("mousemove", function (e) {
        const rect = widget.getBoundingClientRect();
        const widgetCenterX = rect.left + rect.width / 2;
        const widgetCenterY = rect.top + rect.height / 2;
        const distanceX = e.clientX - widgetCenterX;
        const distanceY = e.clientY - widgetCenterY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        const magnetArea = 120;

        if (distance < magnetArea) {
          const moveX = distanceX * 0.15;
          const moveY = distanceY * 0.15;
          widget.style.transform = `translate(${moveX}px, ${moveY}px)`;
        } else {
          widget.style.transform = "translate(0,0)";
        }
      });

      let expandedOnce = false;
      window.addEventListener("scroll", () => {
        const scrollPosition = window.scrollY;
        const docHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
        const winHeight = window.innerHeight;
        const pageHeight = docHeight - winHeight;
        if (pageHeight <= 0) return;
        const scrollPercent = scrollPosition / pageHeight;

        if (scrollPercent > 0.5 && !expandedOnce) {
          expandedOnce = true;
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });

      let exitIntentTriggered = false;
      document.addEventListener("mousemove", function (e) {
        if (e.clientY < 20 && !exitIntentTriggered) {
          exitIntentTriggered = true;
          widget.classList.add("exit-intent-active");
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            widget.classList.remove("exit-intent-active");
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });
    })();
  </script>

</body>

</html>
