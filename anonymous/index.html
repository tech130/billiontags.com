<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anonymous Feedback Box</title>
  <link rel="icon" href="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/infinity.png"
    type="image/x-icon" />
  <style>
    :root {
      --primary-color: #4CAF50;
      --primary-hover: #45a049;
      --bg-color: #f2f2f2;
      --card-bg: #fff;
      --radius: 20px;
      --shadow: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    section.feedback-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 95%;
      height: 90%;
      max-width: 1200px;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 20px;
    }

    .tablet,
    .feedback-card {
      flex: 1;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .tablet {
      border: 6px solid #333;
      background: #000;
    }

    .tablet iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .feedback-card {
      background: var(--card-bg);
      box-shadow: 0 6px 20px var(--shadow);
      padding: 20px;
      justify-content: flex-start;
      align-items: center;
    }

    .feedback-card .logo {
      width: 140px;
      margin-bottom: 15px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.3rem;
      color: #333;
    }

    input,
    textarea,
    select,
    button {
      width: 100%;
      margin-bottom: 12px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input,
    textarea,
    select {
      padding: 12px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
    }

    textarea {
      flex: 1;
      resize: none;
    }

    button {
      padding: 12px;
      border: none;
      background-color: var(--primary-color);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
    }

    .rating {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .emoji {
      font-size: 28px;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .emoji:hover {
      transform: scale(1.3);
    }

    .emoji.selected {
      transform: scale(1.4);
      filter: drop-shadow(0 0 5px gold);
    }

    .popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--primary-color);
      color: #fff;
      padding: 25px 35px;
      border-radius: var(--radius);
      font-size: 18px;
      z-index: 1000;
      animation: fadeInOut 2s ease forwards;
    }

    @keyframes fadeInOut {
      0% {
        opacity: 0;
        transform: translate(-50%, -60%);
      }

      20% {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
    }

    /* ✅ Mobile Full-Screen View */
    @media (max-width: 900px) {

      html,
      body {
        height: 100vh;
        overflow: hidden;
      }

      .container {
        flex-direction: column;
        height: 100vh;
      }

      .tablet {
        display: none;

      }

      .feedback-card {
        flex: 1;
        height: 100vh;
        border-radius: 0;
        width: 100%;
        max-width: none;
        justify-content: flex-start;
        padding: 25px;
        overflow-y: auto;
      }

      .feedback-card::-webkit-scrollbar {
        display: none;
      }

      h2 {
        font-size: 1.4rem;
      }

      input,
      textarea,
      select,
      button {
        font-size: 16px;
      }

      button {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <section class="feedback-section">
    <div class="container">
      <div class="tablet">
        <iframe src="https://billiontags.com/index.html"></iframe>
      </div>

      <div class="feedback-card">
        <img src="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/BILLION%20TAGS%20PNG.png" class="logo"  alt="Logo" />
        <h2>Feel free to share your Grievances!</h2>

        <form id="feedbackForm" action="https://formspree.io/f/mzzjazpy" method="POST">
          <input type="text" name="name" placeholder="Your Name (optional)">
          <input type="text" name="tagid" placeholder="Your Tag ID (optional)">
          <input type="email" name="gmail" placeholder="Your Gmail (optional)">

          <div class="rating" id="rating">
            <span class="emoji" data-value="1" aria-label="Very Bad">😡</span>
            <span class="emoji" data-value="2" aria-label="Bad">😞</span>
            <span class="emoji" data-value="3" aria-label="Neutral">😐</span>
            <span class="emoji" data-value="4" aria-label="Good">😊</span>
            <span class="emoji" data-value="5" aria-label="Excellent">😍</span>
          </div>
          <input type="hidden" name="rating" id="ratingInput">

          <textarea name="feedback" placeholder="Drop your grievances here..." required></textarea>
          <select name="category" required>
            <option value="">Select Category</option>
            <option value="work-environment">Work Environment</option>
            <option value="tools">Needs</option>
            <option value="communication">Personal</option>
            <option value="other">Other</option>
          </select>

          <button type="submit">Submit Feedback</button>
        </form>
      </div>
    </div>
  </section>

  <div class="popup" id="popup">🎉 Thank you for your feedback!</div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
  <script>
    const form = document.getElementById('feedbackForm');
    const popup = document.getElementById('popup');
    const emojis = document.querySelectorAll('.emoji');
    const ratingInput = document.getElementById('ratingInput');

    emojis.forEach(emoji => {
      emoji.addEventListener('click', () => {
        emojis.forEach(e => e.classList.remove('selected'));
        emoji.classList.add('selected');
        ratingInput.value = emoji.dataset.value;
      });
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      popup.style.display = 'block';
      confetti({ particleCount: 150, spread: 90, origin: { y: 0.6 } });

      setTimeout(() => {
        form.submit();
        form.reset();
        emojis.forEach(e => e.classList.remove('selected'));
        popup.style.display = 'none';
      }, 1500);
    });
  </script>

</body>

</html>
