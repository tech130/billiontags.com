  <script>
    fetch("/header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
                updateNav(); // auto-injected

        // âœ… Add active class to current page link
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.navbar-nav .nav-link');

        navLinks.forEach(link => {
          const href = link.getAttribute('href');
          // Check if link matches current page
          if (currentPath === href || currentPath.startsWith(href + '/')) {
            link.classList.add('active');
          }
        });

        // Initialize animated text after header is loaded
        const words = ["SOLVED", "DECODED", "IMPACTED", "MONETIZED"];
        let currentWordIndex = 0;
        let currentCharIndex = 0;
        const animatedText = document.getElementById('animated-text');

        if (animatedText) {
          function typeWord() {
            animatedText.classList.remove('no-cursor'); // Show cursor while typing
            if (currentCharIndex < words[currentWordIndex].length) {
              animatedText.textContent += words[currentWordIndex].charAt(currentCharIndex);
              currentCharIndex++;
              setTimeout(typeWord, 150);
            } else {
              setTimeout(() => {
                eraseWord();
              }, 1000);
            }
          }

          function eraseWord() {
            if (currentCharIndex > 0) {
              animatedText.textContent = words[currentWordIndex].substring(0, currentCharIndex - 1);
              currentCharIndex--;
              setTimeout(eraseWord, 100);
            } else {
              animatedText.classList.add('no-cursor'); // Hide cursor when word is erased
              currentWordIndex = (currentWordIndex + 1) % words.length;
              setTimeout(typeWord, 500);
            }
          }

          typeWord();
        }
      });

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Fade in the page on load
      document.body.classList.add('fade-in');

      // Attach click event to all internal links
      document.querySelectorAll('a[href]').forEach(function (anchor) {
        const href = anchor.getAttribute('href');

        // Only apply to internal links (same origin and not hash links)
        if (
          href &&
          !href.startsWith('http') && // exclude external links
          !href.startsWith('#') &&
          !href.startsWith('mailto:') &&
          !href.startsWith('tel:')
        ) {
          anchor.addEventListener('click', function (e) {
            e.preventDefault();

            // Add fade-out class
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');

            // After transition duration, navigate to link
            setTimeout(function () {
              window.location.href = href;
            }, 500); // match transition duration in CSS
          });
        }
      });
    });

  <script>
    (function() {
      const widget = document.getElementById("orbitWidget");
      if (!widget) return;
      
      const tooltip = document.getElementById("ctaTooltip");
      const expandCTA = document.getElementById("expandCTA");
      
      widget.onclick = function () {
        window.open(
          "https://calendar.google.com/calendar/appointments/schedules/AcZssZ0QDFbA_UN8Oqs2MGQ_cpAb6FoyxDO3mACIvtvxYWjjDAhEWJmP6mvaddBsiksLe0DTDp7Fl3Tr?gv=true",
          "_blank"
        );
      };

      function triggerBounce() {
        widget.classList.add("bounce");
        setTimeout(() => {
          widget.classList.remove("bounce");
        }, 900);
      }

      setTimeout(triggerBounce, 10000);
      setInterval(triggerBounce, 20000);

      setTimeout(() => {
        if (tooltip) tooltip.style.opacity = "1";
        setTimeout(() => {
          if (tooltip) tooltip.style.opacity = "0";
        }, 4000);
      }, 6000);

      document.addEventListener("mousemove", function (e) {
        const rect = widget.getBoundingClientRect();
        const widgetCenterX = rect.left + rect.width / 2;
        const widgetCenterY = rect.top + rect.height / 2;
        const distanceX = e.clientX - widgetCenterX;
        const distanceY = e.clientY - widgetCenterY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        const magnetArea = 120;

        if (distance < magnetArea) {
          const moveX = distanceX * 0.15;
          const moveY = distanceY * 0.15;
          widget.style.transform = `translate(${moveX}px, ${moveY}px)`;
        } else {
          widget.style.transform = "translate(0,0)";
        }
      });

      let expandedOnce = false;
      window.addEventListener("scroll", () => {
        const scrollPosition = window.scrollY;
        const docHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
        const winHeight = window.innerHeight;
        const pageHeight = docHeight - winHeight;
        if (pageHeight <= 0) return;
        const scrollPercent = scrollPosition / pageHeight;

        if (scrollPercent > 0.5 && !expandedOnce) {
          expandedOnce = true;
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });

      let exitIntentTriggered = false;
      document.addEventListener("mousemove", function (e) {
        if (e.clientY < 20 && !exitIntentTriggered) {
          exitIntentTriggered = true;
          widget.classList.add("exit-intent-active");
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            widget.classList.remove("exit-intent-active");
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });
    })();
  </script>
