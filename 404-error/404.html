  <style>
    body {
      margin: 0;
        font-family: "Raleway", sans-serif;
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      /* Background image */
      background: url('/404-error/image') no-repeat center center/cover;
      position: relative;
    }

    /* Overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5); /* semi-transparent overlay */
      z-index: 0;
    }

    .container {
      max-width: 600px;
      z-index: 2; /* above overlay */
      color: #fff;
    }

    h1 {
      font-size: 10rem;
      font-weight: bold;
      color: #9221e5; /* purple number */
      margin: 0;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h2 {
      font-size: 2rem;
      margin: 20px 0;
      color: #ffffff;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      color: #f0f0f0;
    }

    /* Modern button with purple gradient */
    a.btn-modern {
      display: inline-block;
      padding: 12px 35px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #9221e5, #b04df2);
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    a.btn-modern::after {
      content: '';
      position: absolute;
      left: -50%;
      top: 0;
      width: 0;
      height: 100%;
      background: rgba(255,255,255,0.3);
      transform: skewX(-20deg);
      transition: all 0.5s ease;
    }

    a.btn-modern:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 20px rgba(0,0,0,0.5);
    }

    a.btn-modern:hover::after {
      width: 200%;
      left: 100%;
    }

    /* Floating background circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(146,33,229,0.2);
      animation: move 6s linear infinite;
      z-index: 1; /* below container but above overlay */
    }

    .circle:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 15%; animation-duration: 5s; }
    .circle:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 5%; animation-duration: 8s; }
    .circle:nth-child(3) { width: 80px; height: 80px; top: 30%; left: 80%; animation-duration: 6s; }

    @keyframes move {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-50px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    /* Mobile adjustments */
    @media (max-width: 576px) {
      h1 { font-size: 6rem; }
      h2 { font-size: 1.5rem; }
      p { font-size: 1rem; }
      a.btn-modern {
        width: 100%;
        padding: 12px 0;
        text-align: center;
      }
    }
  </style>
