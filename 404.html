  <style>
    body {
      margin: 0;
      font-family: "Raleway", sans-serif;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      /* Background image */
      background: url('/image/404.png') no-repeat center center/cover;
      position: relative;
    }

    /* Overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      /* semi-transparent overlay */
      z-index: 0;
    }

    .container {
      max-width: 600px;
      z-index: 2;
      /* above overlay */
      color: #fff;
    }

    h1 {
      font-size: 10rem;
      font-weight: bold;
      color: #9221e5;
      /* purple number */
      margin: 0;
      position: relative;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    h2 {
      font-size: 2rem;
      margin: 20px 0;
      color: #ffffff;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      color: #f0f0f0;
    }

    /* Modern button with purple gradient */
    a.btn-modern {
      display: inline-block;
      padding: 12px 35px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #9221e5, #b04df2);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    a.btn-modern::after {
      content: '';
      position: absolute;
      left: -50%;
      top: 0;
      width: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.3);
      transform: skewX(-20deg);
      transition: all 0.5s ease;
    }

    a.btn-modern:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5);
    }

    a.btn-modern:hover::after {
      width: 200%;
      left: 100%;
    }

    /* Floating background circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(146, 33, 229, 0.2);
      animation: move 6s linear infinite;
      z-index: 1;
      /* below container but above overlay */
    }

    .circle:nth-child(1) {
      width: 100px;
      height: 100px;
      top: 10%;
      left: 15%;
      animation-duration: 5s;
    }

    .circle:nth-child(2) {
      width: 150px;
      height: 150px;
      top: 70%;
      left: 5%;
      animation-duration: 8s;
    }

    .circle:nth-child(3) {
      width: 80px;
      height: 80px;
      top: 30%;
      left: 80%;
      animation-duration: 6s;
    }

    @keyframes move {
      0% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-50px) rotate(180deg);
      }

      100% {
        transform: translateY(0) rotate(360deg);
      }

    /* Mobile adjustments */

<body>
  <!-- Floating circles -->
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed or the URL is incorrect.</p>
    <a href="/" class="btn-modern">Go Back Home</a>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Floating CTA Widget -->
  <div class="orbit-widget" id="orbitWidget">

    <!-- Orbit ring -->
    <div class="orbit-ring"></div>

    <div class="expand-cta" id="expandCTA">
      Book Your Free Discovery Call
    </div>

    <!-- Center Logo -->
    <div class="center-globe">
      <img src="https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/infinity.png" alt="Discovery Call">
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="ctaTooltip">Book Your Free Discovery Call</div>


  </div>

  <style>
    /* Smart CTA Expansion */
    .expand-cta {
      position: absolute;
      right: 95px;
      top: 15px;
      background: #9221e5;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(20px);
      transition: all .4s ease;
      pointer-events: none;
    }

    /* Active expansion */
    .expand-cta.show {
      opacity: 1;
      transform: translateX(0);
    }



    /* Hover effect */
    /* .orbit-widget:hover {
      transform: scale(1.08);
    } */

    /* Center globe */
    .center-globe {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      background-color: transparent;
      position: relative;
      z-index: 2;
    }

    .center-globe img {
      width: 50px;
      height: 50px;
    }

    /* Orbit ring */
    .orbit-ring {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 2px solid #9221e5;
      border-radius: 50%;
      top: -10px;
      left: -10px;
      transform-style: preserve-3d;
      animation: orbitRotate 6s linear infinite, glow 2s ease-in-out infinite;
    }

    /* Glow animation */
    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 0 rgba(146, 33, 229, 0.4);
      }

      50% {
        box-shadow: 0 0 14px rgba(146, 33, 229, 0.7);
      }
    }

    /* Satellite */
    .orbit-ring::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #9221e5;
      border-radius: 50%;
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Orbit rotation */
    @keyframes orbitRotate {
      from {
        transform: rotateX(165deg) rotateZ(0deg);
      }

      to {
        transform: rotateX(165deg) rotateZ(360deg);
      }
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      right: 95px;
      top: 15px;
      background: #9221e5;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: .3s;
    }

    .orbit-widget {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 80px;
      height: 80px;
      cursor: pointer;
      z-index: 9999;

      /* smoother magnetic motion */
      transition: transform 0.25s ease-out;

      /* better animation performance */
      will-change: transform;

      /* GPU acceleration */
      transform: translate3d(0, 0, 0);
    }

    .orbit-widget:hover .tooltip {
      opacity: 1;
    }

    /* Mobile label */
    .mobile-label {
      display: none;
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      background: #9221e5;
      color: white;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* Bounce animation */
    @keyframes bounceAttention {

      0%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-8px)
      }

      50% {
        transform: translateY(0)
      }

      70% {
        transform: translateY(-4px)
      }
    }

    /* ================= */
    /* RESPONSIVE DESIGN */
    /* ================= */

    @media (max-width:1024px) {

      .orbit-widget {
        width: 70px;
        height: 70px;
      }

      .center-globe {
        width: 60px;
        height: 60px;
      }

      .center-globe img {
        width: 50px;
        height: 50px;
      }

      .orbit-ring {
        width: 80px;
        height: 80px;
      }

    }

    @media (max-width:768px) {

      .orbit-widget {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
      }

      .center-globe {
        width: 50px;
        height: 50px;
      }

      .center-globe img {
        width: 40px;
        height: 40px;
      }

      .orbit-ring {
        width: 70px;
        height: 70px;
      }

      .tooltip {
        display: none;
      }

      .mobile-label {
        display: block;
      }

    }

    @media (max-width:480px) {

      .orbit-widget {
        width: 55px;
        height: 55px;
      }

      .center-globe {
        width: 45px;
        height: 45px;
      }

      .center-globe img {
        width: 34px;
        height: 34px;
      }

      .orbit-ring {
        width: 65px;
        height: 65px;
      }

    }

    .bounce {
      animation: bounceAttention 0.9s ease;
    }

    /* Exit Intent Orbital Pulse */

    @keyframes exitPulse {

      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.25);
      }

      60% {
        transform: scale(1.18);
      }

      100% {
        transform: scale(1);
      }

    }

    /* Stronger glow */
    .exit-intent-active .orbit-ring {
      box-shadow: 0 0 25px rgba(146, 33, 229, 0.9);
      border-color: #b24cff;
    }

    /* Widget expansion */
    .exit-intent-active {
      animation: exitPulse 1.2s ease;
    }
  </style>

  <script>
    (function () {
      const widget = document.getElementById("orbitWidget");
      if (!widget) return;

      const tooltip = document.getElementById("ctaTooltip");
      const expandCTA = document.getElementById("expandCTA");

      widget.onclick = function () {
        window.open(
          "https://calendar.google.com/calendar/appointments/schedules/AcZssZ0QDFbA_UN8Oqs2MGQ_cpAb6FoyxDO3mACIvtvxYWjjDAhEWJmP6mvaddBsiksLe0DTDp7Fl3Tr?gv=true",
          "_blank"
        );
      };

      function triggerBounce() {
        widget.classList.add("bounce");
        setTimeout(() => {
          widget.classList.remove("bounce");
        }, 900);
      }

      setTimeout(triggerBounce, 10000);
      setInterval(triggerBounce, 20000);

      setTimeout(() => {
        if (tooltip) tooltip.style.opacity = "1";
        setTimeout(() => {
          if (tooltip) tooltip.style.opacity = "0";
        }, 4000);
      }, 6000);

      document.addEventListener("mousemove", function (e) {
        const rect = widget.getBoundingClientRect();
        const widgetCenterX = rect.left + rect.width / 2;
        const widgetCenterY = rect.top + rect.height / 2;
        const distanceX = e.clientX - widgetCenterX;
        const distanceY = e.clientY - widgetCenterY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        const magnetArea = 120;

        if (distance < magnetArea) {
          const moveX = distanceX * 0.15;
          const moveY = distanceY * 0.15;
          widget.style.transform = `translate(${moveX}px, ${moveY}px)`;
        } else {
          widget.style.transform = "translate(0,0)";
        }
      });

      let expandedOnce = false;
      window.addEventListener("scroll", () => {
        const scrollPosition = window.scrollY;
        const docHeight = document.documentElement.scrollHeight || document.body.scrollHeight;
        const winHeight = window.innerHeight;
        const pageHeight = docHeight - winHeight;
        if (pageHeight <= 0) return;
        const scrollPercent = scrollPosition / pageHeight;

        if (scrollPercent > 0.5 && !expandedOnce) {
          expandedOnce = true;
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });

      let exitIntentTriggered = false;
      document.addEventListener("mousemove", function (e) {
        if (e.clientY < 20 && !exitIntentTriggered) {
          exitIntentTriggered = true;
          widget.classList.add("exit-intent-active");
          if (expandCTA) expandCTA.classList.add("show");
          setTimeout(() => {
            widget.classList.remove("exit-intent-active");
            if (expandCTA) expandCTA.classList.remove("show");
          }, 4000);
        }
      });
    })();
  </script>

</body>
