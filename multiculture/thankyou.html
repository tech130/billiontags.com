<style>
  /* Background iframe styles */
  #backgroundContent {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    border: none;
    z-index: 0;
    filter: blur(8px) brightness(0.6);
  }

  /* Blur overlay */
  .blurred-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.15);
    z-index: 998;
    pointer-events: none;
  }

  /* Popup container styles */
  .popup-container {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #1c003a;
    color: #e0d7ff;
    border-radius: 16px;
    box-shadow:
      0 8px 24px rgba(134, 102, 255, 0.4),
      0 12px 48px rgba(134, 102, 255, 0.3);
    width: 90%;
    max-width: 420px;
    padding: 3rem 2.5rem 2.5rem 2.5rem;
    text-align: center;
    z-index: 9999;
    letter-spacing: 0.04em;
    /* Popup entrance animation */
    animation: popupFadeIn 0.8s ease forwards;
    opacity: 0;
  }

  @keyframes popupFadeIn {
    0% {
      transform: translate(-50%, -60%) scale(0.85);
      opacity: 0;
    }
    100% {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
  }

  .popup-container h1 {
    margin: 0 0 1.2rem 0;
    font-size: 2rem;
    font-weight: 900;
    color: #c3b1ff;
    text-shadow: 0 0 10px #a36eff99;
  }

  .popup-container p.subline {
    font-size: 1.1rem;
    color: #b5a8ffcc;
    margin-bottom: 2rem;
    font-weight: 600;
  }

  .engagement-nudges {
    margin-bottom: 2.5rem;
    display: flex;
    justify-content: center;
    gap: 1.25rem;
  }

  /* Styled buttons with smooth gradient and scale hover */
  .engagement-nudges a {
    background: linear-gradient(135deg, #7b4dff, #b48cff);
    padding: 0.75rem 2.2rem;
    border-radius: 35px;
    font-size: 1.05rem;
    font-weight: 700;
    color: #222;
    text-decoration: none;
    box-shadow:
      0 4px 10px rgb(123 77 255 / 0.3),
      inset 0 -2px 15px rgb(123 77 255 / 0.45);
    transition:
      background 0.4s ease,
      box-shadow 0.4s ease,
      color 0.4s ease,
      transform 0.25s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
    user-select: none;
    /* Button entry animation */
    animation: buttonPopUp 0.5s ease forwards;
  }

  .engagement-nudges a:hover,
  .engagement-nudges a:focus {
    background: linear-gradient(135deg, #d4bcff, #9679fd);
    color: #2c1d69;
    box-shadow:
      0 6px 20px rgb(180 140 255 / 0.8),
      inset 0 -4px 20px rgb(180 140 255 / 0.7);
    transform: scale(1.08);
    outline: none;
  }

  @keyframes buttonPopUp {
    0% {
      opacity: 0;
      transform: scale(0.8);
    }
    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  .popup-container p.closing-line {
    font-style: italic;
    color: #8e7ed5cc;
    font-weight: 600;
    font-size: 1.05rem;
  }

  .close-btn {
    position: absolute;
    right: 18px;
    top: 18px;
    font-size: 28px;
    font-weight: 900;
    color: #9b8cffcc;
    cursor: pointer;
    user-select: none;
    transition: color 0.3s ease;
  }
  .close-btn:hover,
  .close-btn:focus {
    color: #d4bcff;
    outline: none;
  }
</style>
<script>
  function redirectToIndex() {
    window.location.href = 'index.html';
  }

  function closePopup() {
    const popup = document.getElementById('thankYouPopup');
    const bg = document.getElementById('blurredBg');
    const iframe = document.getElementById('backgroundContent');
    if(popup) popup.style.display = 'none';
    if(bg) bg.style.display = 'none';
    if(iframe) iframe.style.filter = 'none'; // Remove blur on iframe
    redirectToIndex();
  }

  window.onload = function() {
    setTimeout(() => {
      closePopup();
    }, 20000);
  };
</script>

<body>

  <!-- Iframe showing the actual index page in background -->
  <iframe src="index.html" id="backgroundContent"></iframe>

  <div class="blurred-bg" id="blurredBg"></div>

  <div class="popup-container" id="thankYouPopup" role="dialog" aria-labelledby="popupTitle" aria-describedby="popupDesc" tabindex="-1">
    <span class="close-btn" aria-label="Close popup" onclick="closePopup()" tabindex="0">&times;</span>
    <h1 id="popupTitle">Your Next Big Connection Starts Here.</h1>
    <p class="subline" id="popupDesc">
      Thanks for reaching out! The Billiontags team is already on it — we’ll be in touch soon.
    </p>
    <div class="engagement-nudges" aria-label="Explore more from Billiontags">
      <a href="https://www.billiontags.com/blog" target="_blank" rel="noopener noreferrer" aria-label="Read Our Blogs" tabindex="0">
        📖 Read Our Blogs
      </a>
      <a href="https://www.linkedin.com/company/billiontagsofficial" target="_blank" rel="noopener noreferrer" aria-label="Connect with us on LinkedIn" tabindex="0">
        🤝 Connect with Us on LinkedIn
      </a>
    </div>
    <p class="closing-line">
      Together, let’s turn culture into your brand’s growth advantage.
    </p>
  </div>

</body>
