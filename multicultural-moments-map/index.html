    // Render timeline for selected month
    function renderTimeline(monthIdx) {
      const timelineSection = document.getElementById("timelineSection");
      timelineSection.innerHTML = '<div class="timeline-center-line"></div>';
      const events = timelineData[monthIdx] || [];
      events.forEach((event, idx) => {
        const side = idx % 2 === 0 ? "left" : "right";
        if (side === "left") {
          timelineSection.innerHTML += `
            <div class="timeline-event-row left">
              <div class="timeline-date-box">
                <div class="timeline-date">${event.day}<span>${event.month}</span></div>
              </div>
              <div class="timeline-content-box">
                <img src="${event.img}" class="timeline-img" alt="${event.title}">
                <div class="timeline-text">
                  <span class="event-type">${event.type}</span>
                  <h5>${event.title}</h5>
                  <p>${event.desc}</p>
                </div>
              </div>
            </div>
          `;
        } else {
          timelineSection.innerHTML += `
            <div class="timeline-event-row right">
              <div class="timeline-content-box">
                <img src="${event.img}" class="timeline-img" alt="${event.title}">
                <div class="timeline-text">
                  <span class="event-type">${event.type}</span>
                  <h5>${event.title}</h5>
                  <p>${event.desc}</p>
                </div>
              </div>
              <div class="timeline-date-box">
                <div class="timeline-date">${event.day}<span>${event.month}</span></div>
              </div>
            </div>
          `;
        }
      });
      setTimeout(animateVisibleEvents, 200);
    }
    // Animate events on scroll
    function animateVisibleEvents() {
      const events = document.querySelectorAll(".timeline-event-row");
      const triggerBottom = window.innerHeight * 0.85;
      events.forEach((event, idx) => {
        const eventTop = event.getBoundingClientRect().top;
        if (eventTop < triggerBottom) {
          event.classList.add("visible");
        }
      });
    }
    // Month tab click handler
    document.querySelectorAll(".month-link").forEach((link, idx) => {
      link.addEventListener("click", function (e) {
        e.preventDefault();
        document
          .querySelectorAll(".month-link")
          .forEach((l) => l.classList.remove("active"));
        this.classList.add("active");
        document.getElementById(
          "monthHeading"
        ).textContent = `${monthNames[idx]} 2026`;
        renderTimeline(idx);
        window.scrollTo({
          top: document.getElementById("monthNavbar").offsetTop,
          behavior: "smooth",
        });
        // Scroll to the first event element after re-render
        setTimeout(() => {
          const firstEvent = document.querySelector(".timeline-event-row");
          if (firstEvent) {
            const yOffset = -270; // Optional: offset to account for sticky nav
            const y =
              firstEvent.getBoundingClientRect().top +
              window.pageYOffset +
              yOffset;
            window.scrollTo({ top: y, behavior: "smooth" });
          }
        }, 100); // Wait for DOM update after renderTimeline
      });
    });
    // Initial render

  <!-- smooth navigation to another page  -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Fade in the page on load
      document.body.classList.add('fade-in');

      // Attach click event to all internal links
      document.querySelectorAll('a[href]').forEach(function (anchor) {
        const href = anchor.getAttribute('href');

        // Only apply to internal links (same origin and not hash links)
        if (
          href &&
          !href.startsWith('http') && // exclude external links
          !href.startsWith('#') &&
          !href.startsWith('mailto:') &&
          !href.startsWith('tel:')
        ) {
          anchor.addEventListener('click', function (e) {
            e.preventDefault();

            // Add fade-out class
            document.body.classList.remove('fade-in');
            document.body.classList.add('fade-out');

            // After transition duration, navigate to link
            setTimeout(function () {
              window.location.href = href;
            }, 500); // match transition duration in CSS
          });
        }
      });
    });

  </script>

  <script>
    fetch("/header.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("header").innerHTML = data;
                updateNav(); // auto-injected


        /* =========================
           NAVBAR SCROLL LOGIC
        ========================== */
        const navbar = document.querySelector(".navbar");
        const logo = document.getElementById("navbarLogo");

        if (navbar && logo) {
          // Set default logo on load
          logo.src =
            "https://billiontags-media.s3.ap-south-1.amazonaws.com/img/Logo/BILLION TAGS PNG.png";

          window.addEventListener("scroll", () => {
            if (window.scrollY > 40) {
              navbar.classList.add("scrolled");
            } else {
              navbar.classList.remove("scrolled");
            }
          });
        }
        // Initialize animated text after header is loaded
        const words = ["SOLVED", "DECODED", "IMPACTED", "MONETIZED"];
        let currentWordIndex = 0;
        let currentCharIndex = 0;
        const animatedText = document.getElementById('animated-text');

        if (animatedText) {
          function typeWord() {
            animatedText.classList.remove('no-cursor'); // Show cursor while typing
            if (currentCharIndex < words[currentWordIndex].length) {
              animatedText.textContent += words[currentWordIndex].charAt(currentCharIndex);
              currentCharIndex++;
              setTimeout(typeWord, 150);
            } else {
              setTimeout(() => {
                eraseWord();
              }, 1000);
            }
          }

          function eraseWord() {
            if (currentCharIndex > 0) {
              animatedText.textContent = words[currentWordIndex].substring(0, currentCharIndex - 1);
              currentCharIndex--;
              setTimeout(eraseWord, 100);
            } else {
              animatedText.classList.add('no-cursor'); // Hide cursor when word is erased
              currentWordIndex = (currentWordIndex + 1) % words.length;
              setTimeout(typeWord, 500);
            }
          }

          typeWord();
        }
      });

    fetch("/footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
        // Set the current year for the copyright notice
        const yearElem = document.getElementById("currentYear");
        if (yearElem) {
          yearElem.textContent = new Date().getFullYear();
        }
      });
  </script>
